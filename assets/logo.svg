<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 280" width="220" height="280">
  <defs>
    <linearGradient id="shieldBg" x1="5%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1d4d34"/>
      <stop offset="45%" stop-color="#0f2a1e"/>
      <stop offset="100%" stop-color="#081911"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe55a"/>
      <stop offset="100%" stop-color="#e8a000"/>
    </linearGradient>
    <radialGradient id="ballGrad" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#3de87e"/>
      <stop offset="100%" stop-color="#0f7a38"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="greenBand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f8b47"/>
      <stop offset="100%" stop-color="#0e5c2e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="shieldClip">
      <path d="M17,17 L203,17 L203,176.4 Q203,244.78 110.0,263 Q17,244.78 17,176.4 Z"/>
    </clipPath>
  </defs>

  <path d="M10,10 L210,10 L210,176.4 Q210,246.60000000000002 110.0,270 Q10,246.60000000000002 10,176.4 Z" fill="url(#goldGrad)" filter="url(#shadow)"/>
  <path d="M15,15 L205,15 L205,176.4 Q205,245.3 110.0,265 Q15,245.3 15,176.4 Z" fill="#091a0f"/>
  <path d="M17,17 L203,17 L203,176.4 Q203,244.78 110.0,263 Q17,244.78 17,176.4 Z" fill="url(#shieldBg)"/>

  <g clip-path="url(#shieldClip)">
    <path d="M28,28 L192,28 L192,176.4 Q192,241.92000000000002 110.0,252 Q28,241.92000000000002 28,176.4 Z" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4"/>

    <!-- Top BRAZUKAS band -->
    <rect x="18" y="38" width="184" height="34" rx="3" fill="rgba(0,0,0,0.28)"/>
    <rect x="18" y="38" width="184" height="34" rx="3"
          fill="none" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.4"/>
    <path d="M88.00,22.50 L89.47,25.98 L93.23,26.30 L90.38,28.77 L91.23,32.45 L88.00,30.50 L84.77,32.45 L85.62,28.77 L82.77,26.30 L86.53,25.98 Z" fill="url(#goldGrad)" filter="url(#goldglow)"/>
    <path d="M110.00,15.00 L111.76,19.57 L116.66,19.84 L112.85,22.93 L114.11,27.66 L110.00,25.00 L105.89,27.66 L107.15,22.93 L103.34,19.84 L108.24,19.57 Z" fill="url(#goldGrad)" filter="url(#goldglow)"/>
    <path d="M132.00,22.50 L133.47,25.98 L137.23,26.30 L134.38,28.77 L135.23,32.45 L132.00,30.50 L128.77,32.45 L129.62,28.77 L126.77,26.30 L130.53,25.98 Z" fill="url(#goldGrad)" filter="url(#goldglow)"/>
    <text x="110.0" y="61" text-anchor="middle"
          fill="url(#goldGrad)"
          font-family="Arial Black, Impact, sans-serif"
          font-size="20" font-weight="900" letter-spacing="5"
          filter="url(#goldglow)">BRAZUKAS</text>

    <line x1="18" y1="75" x2="202" y2="75" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.5"/>

    <!-- Ball -->
    <circle cx="110.0" cy="109.2" r="64" fill="url(#centerGlow)"/>
    <circle cx="110.0" cy="109.2" r="46"
            fill="url(#ballGrad)" opacity="0.2"/>
    <circle cx="110.0" cy="109.2" r="46"
            fill="none" stroke="#2ecc71" stroke-width="2" opacity="0.85"/>
    <path d="M110.0,94.5 L124.0,104.7 L118.7,121.1 L101.3,121.1 L96.0,104.7 Z" fill="rgba(0,0,0,0.65)" stroke="#2ecc71" stroke-width="0.8" opacity="0.8"/>
    <path d="M110.0,70.1 L119.2,76.8 L115.7,87.6 L104.3,87.6 L100.8,76.8 Z" fill="rgba(0,0,0,0.5)" stroke="#2ecc71" stroke-width="0.7" opacity="0.7"/><path d="M147.2,97.1 L143.7,107.9 L132.3,107.9 L128.8,97.1 L138.0,90.4 Z" fill="rgba(0,0,0,0.5)" stroke="#2ecc71" stroke-width="0.7" opacity="0.7"/><path d="M133.0,140.8 L121.6,140.8 L118.1,130.0 L127.3,123.4 L136.5,130.0 Z" fill="rgba(0,0,0,0.5)" stroke="#2ecc71" stroke-width="0.7" opacity="0.7"/><path d="M87.0,140.8 L83.5,130.0 L92.7,123.4 L101.9,130.0 L98.4,140.8 Z" fill="rgba(0,0,0,0.5)" stroke="#2ecc71" stroke-width="0.7" opacity="0.7"/><path d="M72.8,97.1 L82.0,90.4 L91.2,97.1 L87.7,107.9 L76.3,107.9 Z" fill="rgba(0,0,0,0.5)" stroke="#2ecc71" stroke-width="0.7" opacity="0.7"/>
    <text x="110.0" y="123.2" text-anchor="middle"
          fill="#f3f7f4"
          font-family="Arial Black, Impact, sans-serif"
          font-size="40" font-weight="900" letter-spacing="-1"
          filter="url(#textglow)">FC</text>

    <!-- Side stars -->
    <path d="M46.00,103.20 L47.53,107.10 L51.71,107.35 L48.47,110.00 L49.53,114.05 L46.00,111.80 L42.47,114.05 L43.53,110.00 L40.29,107.35 L44.47,107.10 Z" fill="url(#goldGrad)" opacity="0.75"/>
    <path d="M174.00,103.20 L175.53,107.10 L179.71,107.35 L176.47,110.00 L177.53,114.05 L174.00,111.80 L170.47,114.05 L171.53,110.00 L168.29,107.35 L172.47,107.10 Z" fill="url(#goldGrad)" opacity="0.75"/>

    <!-- GRONINGEN band — entirely within rectangular zone (above y=176) -->
    <line x1="17" y1="158.0" x2="203" y2="158.0"
          stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.7"/>
    <rect x="17" y="158" width="186" height="14"
          fill="url(#greenBand)"/>
    <text x="110.0" y="168.6" text-anchor="middle"
          fill="#f3f7f4"
          font-family="Arial Black, Impact, sans-serif"
          font-size="9" font-weight="900" letter-spacing="4">GRONINGEN</text>
    <line x1="17" y1="172.0" x2="203" y2="172.0"
          stroke="url(#goldGrad)" stroke-width="1.2" opacity="0.7"/>

  </g>
</svg>