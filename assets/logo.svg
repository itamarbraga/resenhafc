<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 280" width="220" height="280">
  <defs>
    <linearGradient id="shieldBg" x1="5%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1d4d34"/>
      <stop offset="45%" stop-color="#0f2a1e"/>
      <stop offset="100%" stop-color="#081911"/>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffe55a"/>
      <stop offset="100%" stop-color="#e8a000"/>
    </linearGradient>
    <radialGradient id="ballGrad" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#3de87e"/>
      <stop offset="100%" stop-color="#0f7a38"/>
    </radialGradient>
    <radialGradient id="centerGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2ecc71" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#2ecc71" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="greenBand" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f8b47"/>
      <stop offset="100%" stop-color="#0e5c2e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="5" stdDeviation="9" flood-color="#000" flood-opacity="0.55"/>
    </filter>
    <filter id="textglow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="goldglow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="shieldClip">
      <path d="M17,17 L203,17 L203,176.4 Q203,244.78 110.0,263 Q17,244.78 17,176.4 Z"/>
    </clipPath>
  </defs>

  <!-- Gold outer ring -->
  <path d="M10,10 L210,10 L210,176.4 Q210,246.60000000000002 110.0,270 Q10,246.60000000000002 10,176.4 Z" fill="url(#goldGrad)" filter="url(#shadow)"/>
  <path d="M15,15 L205,15 L205,176.4 Q205,245.3 110.0,265 Q15,245.3 15,176.4 Z" fill="#091a0f"/>
  <path d="M17,17 L203,17 L203,176.4 Q203,244.78 110.0,263 Q17,244.78 17,176.4 Z" fill="url(#shieldBg)"/>

  <g clip-path="url(#shieldClip)">

    <!-- Inner fine border -->
    <path d="M28,28 L192,28 L192,176.4 Q192,241.92000000000002 110.0,252 Q28,241.92000000000002 28,176.4 Z" fill="none" stroke="url(#goldGrad)" stroke-width="1" opacity="0.4"/>

    <!-- Top band -->
    <rect x="18" y="38" width="184" height="36" rx="3" fill="rgba(0,0,0,0.28)"/>
    <rect x="18" y="38" width="184" height="36" rx="3"
          fill="none" stroke="url(#goldGrad)" stroke-width="0.8" opacity="0.4"/>

    <!-- Stars -->
    <path d="M88.00,22.50 L89.47,25.98 L93.23,26.30 L90.38,28.77 L91.23,32.45 L88.00,30.50 L84.77,32.45 L85.62,28.77 L82.77,26.30 L86.53,25.98 Z" fill="url(#goldGrad)" filter="url(#goldglow)"/>
    <path d="M110.00,15.00 L111.76,19.57 L116.66,19.84 L112.85,22.93 L114.11,27.66 L110.00,25.00 L105.89,27.66 L107.15,22.93 L103.34,19.84 L108.24,19.57 Z" fill="url(#goldGrad)" filter="url(#goldglow)"/>
    <path d="M132.00,22.50 L133.47,25.98 L137.23,26.30 L134.38,28.77 L135.23,32.45 L132.00,30.50 L128.77,32.45 L129.62,28.77 L126.77,26.30 L130.53,25.98 Z" fill="url(#goldGrad)" filter="url(#goldglow)"/>

    <!-- BRAZUKAS -->
    <text x="110.0" y="63" text-anchor="middle"
          fill="url(#goldGrad)"
          font-family="Arial Black, Impact, sans-serif"
          font-size="21" font-weight="900" letter-spacing="5"
          filter="url(#goldglow)">BRAZUKAS</text>

    <!-- Divider -->
    <line x1="18" y1="77" x2="202" y2="77" stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.5"/>

    <!-- Glow + Ball -->
    <circle cx="110.0" cy="120.4" r="70" fill="url(#centerGlow)"/>
    <circle cx="110.0" cy="120.4" r="50"
            fill="url(#ballGrad)" opacity="0.2"/>
    <circle cx="110.0" cy="120.4" r="50"
            fill="none" stroke="#2ecc71" stroke-width="2" opacity="0.85"/>
    <path d="M110.0,104.4 L125.2,115.5 L119.4,133.3 L100.6,133.3 L94.8,115.5 Z" fill="rgba(0,0,0,0.65)" stroke="#2ecc71" stroke-width="0.8" opacity="0.8"/>
    <path d="M110.0,77.9 L120.0,85.2 L116.2,96.9 L103.8,96.9 L100.0,85.2 Z" fill="rgba(0,0,0,0.5)" stroke="#2ecc71" stroke-width="0.7" opacity="0.7"/><path d="M150.4,107.3 L146.6,119.0 L134.3,119.0 L130.4,107.3 L140.4,100.0 Z" fill="rgba(0,0,0,0.5)" stroke="#2ecc71" stroke-width="0.7" opacity="0.7"/><path d="M135.0,154.8 L122.6,154.8 L118.8,143.0 L128.8,135.8 L138.8,143.0 Z" fill="rgba(0,0,0,0.5)" stroke="#2ecc71" stroke-width="0.7" opacity="0.7"/><path d="M85.0,154.8 L81.2,143.0 L91.2,135.8 L101.2,143.0 L97.4,154.8 Z" fill="rgba(0,0,0,0.5)" stroke="#2ecc71" stroke-width="0.7" opacity="0.7"/><path d="M69.6,107.3 L79.6,100.0 L89.6,107.3 L85.7,119.0 L73.4,119.0 Z" fill="rgba(0,0,0,0.5)" stroke="#2ecc71" stroke-width="0.7" opacity="0.7"/>

    <!-- FC -->
    <text x="110.0" y="135.4" text-anchor="middle"
          fill="#f3f7f4"
          font-family="Arial Black, Impact, sans-serif"
          font-size="42" font-weight="900" letter-spacing="-1"
          filter="url(#textglow)">FC</text>

    <!-- Side stars -->
    <path d="M42.00,113.90 L43.65,118.13 L48.18,118.39 L44.66,121.27 L45.82,125.66 L42.00,123.20 L38.18,125.66 L39.34,121.27 L35.82,118.39 L40.35,118.13 Z" fill="url(#goldGrad)" opacity="0.75"/>
    <path d="M178.00,113.90 L179.65,118.13 L184.18,118.39 L180.66,121.27 L181.82,125.66 L178.00,123.20 L174.18,125.66 L175.34,121.27 L171.82,118.39 L176.35,118.13 Z" fill="url(#goldGrad)" opacity="0.75"/>

    <!-- Gold lines framing GRONINGEN band -->
    <line x1="17" y1="204.4" x2="203" y2="204.4"
          stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.7"/>
    <line x1="17" y1="224.0" x2="203" y2="224.0"
          stroke="url(#goldGrad)" stroke-width="1.5" opacity="0.7"/>

    <!-- Green GRONINGEN band -->
    <rect x="17" y="204" width="186" height="20"
          fill="url(#greenBand)"/>

    <!-- GRONINGEN text -->
    <text x="110.0" y="218.5" text-anchor="middle"
          fill="#f3f7f4"
          font-family="Arial Black, Impact, sans-serif"
          font-size="13" font-weight="900" letter-spacing="4.5">GRONINGEN</text>

  </g>
</svg>